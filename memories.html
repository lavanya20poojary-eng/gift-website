<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#000;
}

.hero{

    width:100%;
    min-height:100vh;

    background-image:url("background1.jpeg");
    background-size:cover;
    background-position:center;
    position:relative;
    padding:80px 20px;

}

.overlay{

    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.7);
    top:0;
    left:0;

}

.content{

    position:relative;
    z-index:2;
    text-align:center;
    color:white;

}

h1{

    font-size:60px;
    margin-bottom:10px;

}

.subtitle{

    font-size:22px;
    margin-bottom:50px;
    opacity:.9;

}

/* Gallery */

.gallery{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:35px;
    width:90%;
    margin:auto;

}

/* Photo Card */

.card{

    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
    transition:.4s;
    cursor:pointer;

}

.card:hover{

    transform:scale(1.05) rotate(2deg);

}

.card img{

    width:100%;
    height:280px;
    object-fit:cover;
    border-radius:10px;

}

.caption{

    color:#333;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;

}

/* Next Button */

.next{

    margin-top:60px;

}

.next button{

    background:#ff4d6d;
    color:white;
    border:none;
    padding:18px 40px;
    font-size:20px;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;

}

.next button:hover{

    background:#ff2b55;
    transform:scale(1.08);

}

.next button:hover{

    background:#ff2b55;
    transform:scale(1.08);

}

/* Popup */

.popup{

    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.9);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:100;

}

.popup img{

    max-width:90%;
    max-height:90%;
    border-radius:20px;

}

.popup span{

    position:absolute;
    top:30px;
    right:40px;
    color:white;
    font-size:45px;
    cursor:pointer;

}


</style>

</head>

<body>

<section class="hero">

<div class="overlay"></div>

<div class="content">

<h1>📸 Our Memories</h1>

<p class="subtitle">

Every picture tells a story...
Every smile hides a beautiful memory.

</p>

<div class="gallery">

<div class="card">
<img src="image7.jpeg" onclick="openImage(this.src)">
<p class="caption">Our First Memory ❤️</p>
</div>

<div class="card">
<img src="image8.jpeg" onclick="openImage(this.src)">
<p class="caption">A Day Full of Smiles 😊</p>
</div>

<div class="card">
<img src="image9.jpeg" onclick="openImage(this.src)">
<p class="caption">The Best Moments ✨</p>
</div>

<div class="card">
<img src="image10.jpeg" onclick="openImage(this.src)">
<p class="caption">Together Forever 🌸</p>
</div>

<div class="card">
<img src="image11.jpeg" onclick="openImage(this.src)">
<p class="caption">Unforgettable Memories 🌙</p>
</div>

<div class="card">
<img src="image12.jpeg" onclick="openImage(this.src)">
<p class="caption">One More Smile ❤️</p>
</div>

</div>

<div class="next">

<button onclick="location.href='letter.html'">

💌 Read My Letter

</button>

</div>

</div>

</section>

<div class="popup" id="popup">

<span onclick="closeImage()">&times;</span>

<img id="popupImage">

</div>

<script>

function openImage(image){

document.getElementById("popup").style.display="flex";

document.getElementById("popupImage").src=image;

}

function closeImage(){

document.getElementById("popup").style.display="none";

}

</script>

</body>

</html>
