<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>For You ❤️</title>

    <!-- Connect CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
<audio id="bgMusic" loop>
    <source src="music.mpeg" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");

document.body.addEventListener("click", function () {
    music.play();
}, { once: true });
</script>
    <!-- Main Section -->
    <section class="hero">

        <!-- Dark overlay -->
        <div class="overlay"></div>

        <!-- Text Content -->
        <div class="content">

            <div class="moon">🌙</div>

            <h1>I'll Miss You</h1>

            <p>

                Distance may separate us,

                but memories never will.

                This little place is filled

                with pieces of our journey together.

            </p>

            <button id="startButton">

                ❤️ Open Our Memories ❤️

            </button>

        </div>

    </section>

    <!-- Connect JavaScript -->
    <script src="script.js"></script>

</body>

</html>
