<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Journey ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Poppins,sans-serif;

    background:url("background1.jpeg") center/cover no-repeat fixed;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    position:relative;

}

body::before{

    content:"";

    position:absolute;

    width:100%;

    height:100%;

    background:rgba(0,0,0,.75);

    top:0;

    left:0;

}

.container{

    position:relative;

    z-index:2;

    width:90%;

    max-width:950px;

    text-align:center;

    color:white;

}

h1{

    font-size:55px;

    margin-bottom:15px;

}

p{

    font-size:22px;

    margin-bottom:35px;

    line-height:1.8;

}

video{

    width:100%;

    border-radius:20px;

    box-shadow:0 10px 40px rgba(255,255,255,.2);

}

button{

    margin-top:40px;

    background:#ff4d6d;

    color:white;

    border:none;

    padding:18px 45px;

    font-size:20px;

    border-radius:50px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    transform:scale(1.08);

    background:#ff2b55;

}

@media(max-width:768px){

h1{

font-size:38px;

}

p{

font-size:18px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>🎥 Our Journey</h1>

<p>

Every smile,

every laugh,

every memory...

will always have a special place in my heart.

</p>

<video controls autoplay>

<source src="vedio1.mp4" type="video/mp4">

Your browser does not support the video tag.

</video>

<button onclick="location.href='final.html'">

❤️ One Last Message

</button>

</div>

</body>

</html>
